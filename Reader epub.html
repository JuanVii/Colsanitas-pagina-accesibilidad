<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector EPUB Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.88/epub.min.js"></script>

    <style>
        :root {
            --bg-color: #f4f4f9;
            --panel-color: #2c3e50;
            --text-panel: white;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg-color);
            transition: background 0.3s;
        }

        #controls {
            padding: 10px 20px;
            background: var(--panel-color);
            color: var(--text-panel);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .group { display: flex; align-items: center; gap: 8px; }

        #viewer {
            flex-grow: 1;
            width: 95%;
            max-width: 1000px;
            margin: 10px auto;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
            background: #3498db;
            color: white;
        }

        button:hover { background: #2980b9; }

        select, input[type="file"] {
            padding: 5px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="group">
            <input type="file" id="file-input" accept=".epub">
        </div>

        <div class="group">
            <button id="prev">⬅</button>
            <button id="next">➡</button>
        </div>

        <div class="group">
            <label>Tamaño:</label>
            <button id="font-down">A-</button>
            <button id="font-up">A+</button>
        </div>

        <div class="group">
            <label>Tema:</label>
            <select id="theme-select">
                <option value="light">Claro</option>
                <option value="dark">Oscuro</option>
                <option value="sepia">Sepia</option>
            </select>
        </div>
    </div>
    
    <div id="viewer"></div>

    <script>
        let book;
        let rendition;
        let fontSize = 100;

        const inputElement = document.getElementById("file-input");
        
        inputElement.addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (window.FileReader) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    if (rendition) rendition.destroy();

                    book = ePub(event.target.result);
                    rendition = book.renderTo("viewer", {
                        width: "100%",
                        height: "100%",
                        flow: "paginated"
                    });

                    // Registrar temas personalizados
                    rendition.themes.register("dark", { "body": { "background": "#1a1a1a", "color": "#ccc" } });
                    rendition.themes.register("sepia", { "body": { "background": "#f4ecd8", "color": "#5b4636" } });
                    rendition.themes.register("light", { "body": { "background": "#ffffff", "color": "#000" } });

                    rendition.display();

                    // Aplicar tamaño inicial
                    rendition.themes.fontSize(fontSize + "%");
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // Controles de Tamaño de Fuente
        document.getElementById("font-up").addEventListener("click", () => {
            fontSize += 10;
            if(rendition) rendition.themes.fontSize(fontSize + "%");
        });

        document.getElementById("font-down").addEventListener("click", () => {
            if (fontSize > 50) fontSize -= 10;
            if(rendition) rendition.themes.fontSize(fontSize + "%");
        });

        // Cambio de Temas
        document.getElementById("theme-select").addEventListener("change", (e) => {
            const theme = e.target.value;
            if(rendition) rendition.themes.select(theme);
            
            // Cambiar fondo del contenedor principal para que coincida
            const viewer = document.getElementById("viewer");
            if(theme === "dark") viewer.style.background = "#1a1a1a";
            else if(theme === "sepia") viewer.style.background = "#f4ecd8";
            else viewer.style.background = "#ffffff";
        });

        // Navegación (Botones y Teclado)
        document.getElementById("next").addEventListener("click", () => rendition?.next());
        document.getElementById("prev").addEventListener("click", () => rendition?.prev());

        document.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft") rendition?.prev();
            if (e.key === "ArrowRight") rendition?.next();
        });
    </script>
</body>
</html>
