<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector EPUB 3.0 Interactivo | Colsanitas & Alma</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <style>
        :root {
            --bg-dark: #121315;
            --bg-controls: #1a1b1e;
            --bg-sidebar: #222327;
            --text-main: #fcfcfc;
            --border-color: #333;
            --pill-bg: #2d2e32;
            --pill-text: #ddd;
            --accent-green: #00a499;
        }

        [data-theme="light"] {
            --bg-dark: #f0f2f5;
            --bg-controls: #ffffff;
            --bg-sidebar: #ffffff;
            --text-main: #121315;
            --border-color: #ddd;
            --pill-bg: #e2e8f0;
            --pill-text: #121315;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* --- Header --- */
        #controls {
            padding: 10px 20px;
            background-color: var(--bg-controls);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .brand-section { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 24px; width: auto; object-fit: contain; }
        .logo-alma { height: 18px; border-left: 1px solid var(--border-color); padding-left: 12px; }

        .only-dark, .only-light { display: none; }
        [data-theme="dark"] .only-light { display: block; }
        [data-theme="light"] .only-dark { display: block; }

        .controls-group { display: flex; align-items: center; gap: 10px; }

        .pill-btn, select, .file-btn {
            padding: 6px 14px;
            background-color: var(--pill-bg);
            border: 1px solid transparent;
            color: var(--pill-text);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .file-btn { background-color: var(--accent-green); color: white; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

        /* --- Layout Principal --- */
        #main-container { flex: 1; display: flex; position: relative; overflow: hidden; }

        #sidebar {
            width: 250px;
            background-color: var(--bg-sidebar);
            padding: 20px;
            transition: transform 0.3s ease;
            position: absolute;
            height: 100%;
            z-index: 50;
            transform: translateX(-100%);
            box-shadow: 5px 0 15px rgba(0,0,0,0.2);
        }
        #sidebar.open { transform: translateX(0); }

        #viewer-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: var(--bg-dark);
            overflow: hidden;
        }

        #book-wrapper {
            width: 100%;
            height: 100%; /* Ajustado para llenar el área permitida */
            max-width: 900px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }

        #viewer { width: 100%; height: 100%; }

        #toc-list { list-style: none; padding: 0; }
        #toc-list li { padding: 10px; cursor: pointer; border-radius: 4px; }
        #toc-list li:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <nav id="controls">
        <div class="controls-group">
            <div class="brand-section">
                <img src="Logo Colsanitas azul y color.png" alt="Colsanitas" class="logo-img only-dark">
                <img src="Logo Colsanitas blanco y color.png" alt="Colsanitas" class="logo-img only-light">
                <img src="alma azul.png" alt="Alma" class="logo-img logo-alma only-dark">
                <img src="alma blanco.png" alt="Alma" class="logo-img logo-alma only-light">
            </div>
            <button id="toggle-sidebar" class="pill-btn">☰ Índice</button>
            <label class="file-btn">
                <input type="file" id="file-input" accept=".epub" class="sr-only">
                Cargar archivo
            </label>
        </div>
        
        <div class="controls-group">
            <button id="theme-toggle" class="pill-btn">🌓 Tema</button>
            <select id="view-mode">
                <option value="auto">Vista: Auto</option>
                <option value="single">1 Pág</option>
                <option value="none">2 Págs</option>
            </select>
            <button id="prev" class="pill-btn">❮</button>
            <button id="next" class="pill-btn">❯</button>
        </div>
    </nav>
    
    <div id="main-container">
        <aside id="sidebar">
            <h3 style="margin-top:0">Índice</h3>
            <ul id="toc-list"></ul>
        </aside>

        <main id="viewer-area">
            <div id="book-wrapper">
                <div id="viewer"></div>
            </div>
        </main>
    </div>

    <script>
        let book, rendition;
        
        // Cambio de Tema
        document.getElementById("theme-toggle").onclick = () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        };

        // Índice
        document.getElementById("toggle-sidebar").onclick = () => {
            document.getElementById("sidebar").classList.toggle("open");
        };

        function loadBook(data) {
            if (rendition) rendition.destroy();
            document.getElementById("toc-list").innerHTML = "";
            
            book = ePub(data);
            
            // --- CONFIGURACIÓN DE INTERACTIVIDAD 3.0 ---
            rendition = book.renderTo("viewer", {
                width: "100%",
                height: "100%",
                flow: "paginated",
                manager: "default",
                allowScriptedContent: true, // Habilita scripts e interactividad
                sandbox: "allow-same-origin allow-scripts allow-popups" // Permisos necesarios
            });

            // Limpieza de estilos para evitar el espacio blanco interno
            rendition.hooks.content.register(function(contents) {
                contents.addStylesheetRules({
                    "body": { "margin": "0 !important", "padding": "0 !important" },
                    "html": { "overflow": "hidden !important" }
                });
            });

            rendition.display();

            book.loaded.navigation.then(nav => {
                nav.toc.forEach(chapter => {
                    const li = document.createElement("li");
                    li.textContent = chapter.label;
                    li.onclick = () => { rendition.display(chapter.href); document.getElementById("sidebar").classList.remove("open"); };
                    document.getElementById("toc-list").appendChild(li);
                });
            });
        }

        document.getElementById("file-input").onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => loadBook(ev.target.result);
                reader.readAsArrayBuffer(file);
            }
        };

        document.getElementById("next").onclick = () => rendition?.next();
        document.getElementById("prev").onclick = () => rendition?.prev();
        document.getElementById("view-mode").onchange = () => {
            rendition?.spread(document.getElementById("view-mode").value);
            rendition?.resize();
        };
    </script>
</body>
</html>
